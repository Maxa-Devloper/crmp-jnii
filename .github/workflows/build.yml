name: Build JNI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get install -y p7zip-full

      - name: Extract archive
        run: 7z x "jninew reiji x kmonarch.zip" -o./jni_source

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build
        run: |
          cd jni_source/kmonarch
          ndk-build

      - name: Upload .so
        uses: actions/upload-artifact@v3
        with:
          name: libplugin
          path: jni_source/kmonarch/libs/
