name: Build JNI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y p7zip-full

      - name: Extract archive
        run: 7z x "jninew reiji x kmonarch.zip" -o./jni_source

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build
        run: |
          cd "jni_source/jninew reiji x kmonarch"
          rm -rf obj/
          ndk-build

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libplugin
          path: "jni_source/jninew reiji x kmonarch/libs/"
